{% extends "base.html" %}
{% load static %}

{% block title %}Payment Cancelled - PawPalace{% endblock %}

{% block content %}
<div class="payment-bg">
    <div class="container">
        <div class="payment-shell">
            <div class="status-card status-cancel">
                <div class="status-icon">
                    <i class="fas fa-times-circle"></i>
                </div>
                <h1>Payment Cancelled</h1>
                <p>Your payment was cancelled. You can try again anytime.</p>

                <div class="status-actions">
                    <a href="{% url 'checkout' %}" class="btn btn-primary">Try Again</a>
                    <a href="{% url 'home' %}" class="btn btn-outline">Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
