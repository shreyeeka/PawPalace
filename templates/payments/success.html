{% extends "base.html" %}
{% load static %}

{% block title %}Payment Successful - PawPalace{% endblock %}

{% block content %}
<div class="payment-bg">
    <div class="container">
        <div class="payment-shell">
            <div class="status-card status-success">
                <div class="status-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1>Payment Successful</h1>
                <p>Your payment was completed successfully. Thank you for shopping with PawPalace.</p>

                <div class="status-actions">
                    <a href="{% url 'home' %}" class="btn btn-primary">Continue Shopping</a>
                    <a href="{% url 'orders:my_orders' %}" class="btn btn-outline">View Orders</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
